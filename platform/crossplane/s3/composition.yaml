apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: s3-bucket.platform.example.com
  labels:
    provider: aws
    service: s3
spec:
  compositeTypeRef:
    apiVersion: platform.example.com/v1alpha1
    kind: XS3Bucket

  mode: Pipeline
  pipeline:
    - step: create-s3-bucket
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          # S3 Bucket
          - name: bucket
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: Bucket
              spec:
                forProvider:
                  forceDestroy: true  # For demo purposes

            patches:
              # Bucket name = the claim's spec.name (no prefix)
              - type: FromCompositeFieldPath
                fromFieldPath: spec.name
                toFieldPath: metadata.name

              # Patch region
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region

              # Pass through the caller's tags
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tags
                toFieldPath: spec.forProvider.tags
                policy:
                  mergeOptions:
                    keepMapValues: true

              - type: ToCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: status.bucketName

              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.arn
                toFieldPath: status.bucketArn

              - type: ToCompositeFieldPath
                fromFieldPath: spec.forProvider.region
                toFieldPath: status.region

            readinessChecks:
              - type: NonEmpty
                fieldPath: status.atProvider.arn

          # S3 Bucket Versioning
          - name: bucket-versioning
            base:
              apiVersion: s3.aws.upbound.io/v1beta2
              kind: BucketVersioning
              spec:
                forProvider:
                  versioningConfiguration:
                    status: Enabled

            patches:
              # Reference the bucket using bucketRef (name = spec.name, no prefix)
              - type: FromCompositeFieldPath
                fromFieldPath: spec.name
                toFieldPath: spec.forProvider.bucketRef.name

              # Patch region
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region

              # Enable versioning based on spec
              - type: FromCompositeFieldPath
                fromFieldPath: spec.versioning
                toFieldPath: spec.forProvider.versioningConfiguration.status
                transforms:
                  - type: convert
                    convert:
                      toType: string
                  - type: map
                    map:
                      "true": "Enabled"
                      "false": "Suspended"

          # S3 Bucket Public Access Block
          - name: bucket-public-access-block
            base:
              apiVersion: s3.aws.upbound.io/v1beta1
              kind: BucketPublicAccessBlock
              spec:
                forProvider:
                  blockPublicAcls: true
                  blockPublicPolicy: true
                  ignorePublicAcls: true
                  restrictPublicBuckets: true

            patches:
              # Reference the bucket (name = spec.name, no prefix)
              - type: FromCompositeFieldPath
                fromFieldPath: spec.name
                toFieldPath: spec.forProvider.bucket

              # Patch region
              - type: FromCompositeFieldPath
                fromFieldPath: spec.region
                toFieldPath: spec.forProvider.region
